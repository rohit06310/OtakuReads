[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    api: API integration tests (require backend running on localhost:5000)
    e2e: End-to-end browser tests (require backend + frontend running)
    slow: Tests that take longer than usual

# Base URLs — override via env vars if needed
# BACKEND_URL = http://localhost:5000
# FRONTEND_URL = http://localhost:5173
